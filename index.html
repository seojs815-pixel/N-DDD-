<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SKR N-DDD Market Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --gl:#0284c7; --pg:#7c3aed; --grand:#047857; --nonpg:#c2410c;
  --csa:#0891b2; --de:#0e7490; --al:#db2777; --mr:#7c3aed; --alltc:#64748b;
  --bg:#f0f2f5; --card:#ffffff; --line:#e2e8f0; --txt:#0f172a; --sub:#64748b;
  --up:#059669; --dn:#dc2626;
  --h1:52px; --h2:40px; --h3:44px; --h4:36px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}

/* ── sticky nav ── */
header{position:sticky;top:0;z-index:60;height:var(--h1);background:#0f172a;color:#fff;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px}
header .brand{font-weight:700;font-size:16px;letter-spacing:-.3px}
header .brand span{color:#7dd3fc;font-weight:500;margin-left:8px;font-size:12px}
header .period{font-size:12px;color:#94a3b8}

#ctrl{position:sticky;top:var(--h1);z-index:59;height:var(--h2);background:#1e293b;
  display:flex;align-items:center;gap:16px;padding:0 20px}
.grp{display:flex;align-items:center;gap:0;background:#334155;border-radius:6px;padding:2px}
.grp button{border:0;background:transparent;color:#94a3b8;font-family:inherit;font-size:12px;font-weight:600;
  padding:4px 12px;border-radius:4px;cursor:pointer;transition:.15s}
.grp button.on{background:#0ea5e9;color:#fff}
.grp button:hover:not(.on){color:#e2e8f0}
.glab{font-size:11px;color:#64748b;font-weight:600;letter-spacing:.5px}

#main{position:sticky;top:calc(var(--h1) + var(--h2));z-index:58;height:var(--h3);
  background:var(--card);border-bottom:1px solid var(--line);display:flex;padding:0 20px;gap:4px}
#main button{border:0;background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--sub);
  padding:0 18px;cursor:pointer;border-bottom:3px solid transparent;transition:.15s}
#main button.on{color:var(--txt);border-bottom-color:var(--ac)}
#main button:hover:not(.on){color:var(--txt);background:#f8fafc}

#sub{position:sticky;top:calc(var(--h1) + var(--h2) + var(--h3));z-index:57;height:var(--h4);
  background:#f8fafc;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:2px;overflow-x:auto}
#sub button{border:0;background:transparent;font-family:inherit;font-size:12px;font-weight:600;color:var(--sub);
  padding:4px 10px;border-radius:5px;cursor:pointer;white-space:nowrap}
#sub button.on{background:var(--ac);color:#fff}
#sub button:hover:not(.on){background:#e2e8f0}
#sub .sep{width:1px;height:16px;background:var(--line);margin:0 6px;flex:none}

/* ── body ── */
main{padding:20px;max-width:1400px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.kpi .k{font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.3px;margin-bottom:6px}
.kpi .v{font-size:24px;font-weight:700;letter-spacing:-.5px}
.kpi .v small{font-size:12px;font-weight:500;color:var(--sub);margin-left:3px}
.kpi .d{font-size:12px;margin-top:4px;font-weight:600}
.up{color:var(--up)} .dn{color:var(--dn)} .nu{color:var(--sub)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px}
.card h3{font-size:13px;font-weight:700;margin-bottom:2px}
.card .cs{font-size:11px;color:var(--sub);margin-bottom:12px}
.chart{position:relative;height:250px}

.seg{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;border-top:3px solid var(--acc)}
.seg .t{font-size:12px;font-weight:700;margin-bottom:2px}
.seg .st{font-size:10px;color:var(--sub);margin-bottom:10px}
.seg .row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:12px}
.seg .row .l{color:var(--sub)}
.seg .row .r{font-weight:600}
.seg .bar{height:5px;background:#e2e8f0;border-radius:3px;margin-top:8px;overflow:hidden}
.seg .bar i{display:block;height:100%;border-radius:3px;background:var(--acc)}

table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:right;padding:8px 10px;font-size:10px;color:var(--sub);font-weight:700;letter-spacing:.3px;
  border-bottom:1px solid var(--line);white-space:nowrap;background:#f8fafc;position:sticky;top:0}
th:first-child,td:first-child{text-align:left}
th:nth-child(2),td:nth-child(2){text-align:left}
td{padding:7px 10px;text-align:right;border-bottom:1px solid #f1f5f9;white-space:nowrap}
tr.s td{background:#fef9c3}
tr.s td:first-child{font-weight:700}
tr:hover td{background:#f1f5f9}
tr.s:hover td{background:#fef08a}
.tw{max-height:520px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:var(--card)}
.star{color:#ca8a04;margin-right:3px}
.mf{font-size:10px;color:var(--sub)}

.note{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;
  color:#78350f;margin-bottom:16px;line-height:1.6}
.note b{color:#92400e}
h2.sh{font-size:13px;font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
h2.sh::before{content:'';width:3px;height:14px;background:var(--ac);border-radius:2px}
@media(max-width:900px){.kpis,.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr}}
</style>
</head>

/* ── state ── */
var S = {m:'V', g:'yoy', tab:'all', scope:'korea'};
var CH = {};

const TABS = [
  {k:'all', n:'전체시장 ALL TC', c:'--alltc'},
  {k:'gl',  n:'Glaucoma',        c:'--gl'},
  {k:'de',  n:'Dry Eye · CsA',   c:'--de'},
  {k:'al',  n:'Allergy',         c:'--al'}
];
const CO = {gl:'#0284c7', pg:'#7c3aed', grand:'#047857', nonpg:'#c2410c',
            csa:'#0891b2', de:'#0e7490', al:'#db2777', mr:'#7c3aed', alltc:'#64748b',
            mkt:'#94a3b8'};

/* ── utils ── */
function hexA(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';}
function isV(){return S.m==='V';}
function uL(){return isV()?'백만원':'개';}
function sc(n){return isV()? n/1000 : n;}
function fmt(n){var x=sc(n); return x>=100? Math.round(x).toLocaleString() : x.toFixed(1);}
function pct(n){return n==null? '–' : (n>=0?'+':'')+n.toFixed(1)+'%';}
function cls(n){return n==null?'nu':(n>0?'up':(n<0?'dn':'nu'));}
function ei(p){var mg=p.mkt[S.g==='qoq'?'qoq':'yoy'], sg=p.san[S.g==='qoq'?'qoq':'yoy'];
  if(mg==null||sg==null||(1+mg/100)===0) return null;
  return (1+sg/100)/(1+mg/100)*100;}
/* 성장 지표: {san, mkt, label} */
function GR(p){
  if(S.g==='ei'){var e=ei(p); return {v:e, txt:e==null?'–':e.toFixed(0), cl:e==null?'nu':(e>=100?'up':'dn'), lab:'EI'};}
  var k=S.g, sv=p.san[k], mv=p.mkt[k];
  return {v:sv, txt:pct(sv), cl:cls(sv), mtxt:pct(mv), mcl:cls(mv), lab:k.toUpperCase()};
}
function share(b1,b2){return b2? b1/b2*100 : 0;}
function shr(p,f){f=f||'matc'; return p.mkt[f]? p.san[f]/p.mkt[f]*100 : 0;}
function shQ(p){return p.mkt.qtrs.map(function(m,i){return m? +(p.san.qtrs[i]/m*100).toFixed(2) : 0;});}
function scQ(b){return b.qtrs.map(sc);}
function d(){return D.scopes[S.scope][S.m];}
function acc(){return S.scope.indexOf('mr_')===0? CO.mr : (TABS.find(function(t){return t.k===S.tab;}).c==='--alltc'?CO.alltc:CO[S.tab]);}

/* ── chart helpers ── */
function chartOpts(){
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index', intersect:false},
    plugins:{
      legend:{display:true, position:'bottom', labels:{boxWidth:10, boxHeight:10, padding:12,
        font:{size:11, family:'Pretendard'}, usePointStyle:true, pointStyle:'circle'}},
      tooltip:{backgroundColor:'#0f172a', padding:10, cornerRadius:6, titleFont:{size:11}, bodyFont:{size:12, family:'IBM Plex Mono'}}
    },
    scales:{
      x:{grid:{display:false}, ticks:{font:{size:10, family:'IBM Plex Mono'}, color:'#64748b'}},
      y:{grid:{color:'#f1f5f9'}, border:{display:false},
         ticks:{font:{size:10, family:'IBM Plex Mono'}, color:'#64748b',
           callback:function(v){return v>=1000? (v/1000).toFixed(0)+'k' : v;}}}
    }
  };
}
function mk(id,cfg){ if(CH[id]) CH[id].destroy();
  var el=document.getElementById(id); if(!el) return;
  CH[id]=new Chart(el.getContext('2d'), cfg); }

/* Market vs Santen 추이 — 반드시 fill:false 선차트 */
function tC(id,p,c){
  var o=chartOpts();
  o.plugins.tooltip.callbacks={label:function(x){return ' '+x.dataset.label+': '+x.parsed.y.toLocaleString(undefined,{maximumFractionDigits:0})+' '+uL();}};
  o.scales.y1={position:'right', grid:{display:false}, border:{display:false},
    ticks:{font:{size:10,family:'IBM Plex Mono'}, color:c,
      callback:function(v){return v>=1000?(v/1000).toFixed(0)+'k':v;}}};
  mk(id,{type:'line', data:{labels:D.meta.qlab, datasets:[
    {label:'Market', data:scQ(p.mkt), yAxisID:'y', borderColor:CO.mkt, backgroundColor:'transparent',
     borderWidth:2, pointRadius:3, pointHoverRadius:5, fill:false, tension:.35,
     pointBackgroundColor:CO.mkt, pointBorderColor:'#fff', pointBorderWidth:1.5},
    {label:'Santen', data:scQ(p.san), yAxisID:'y1', borderColor:c, backgroundColor:'transparent',
     borderWidth:2.5, pointRadius:4, pointHoverRadius:6, fill:false, tension:.35,
     pointBackgroundColor:c, pointBorderColor:'#fff', pointBorderWidth:1.5}
  ]}, options:o});
}
/* Share 추이 — fill:true 허용 */
function sC(id,p,c){
  var o=chartOpts();
  o.plugins.legend.display=false;
  o.plugins.tooltip.callbacks={label:function(x){return ' Share: '+x.parsed.y.toFixed(2)+'%';}};
  o.scales.y.ticks.callback=function(v){return v.toFixed(1)+'%';};
  mk(id,{type:'line', data:{labels:D.meta.qlab, datasets:[
    {label:'Santen Share', data:shQ(p), borderColor:c, backgroundColor:hexA(c,0.12),
     borderWidth:2.5, pointRadius:4, pointHoverRadius:6, fill:true, tension:.35,
     pointBackgroundColor:c, pointBorderColor:'#fff', pointBorderWidth:1.5}
  ]}, options:o});
}
/* 제품 성장률 바 */
function pC(id,prods,c){
  var top=prods.slice(0,10);
  var o=chartOpts();
  o.indexAxis='y';
  o.plugins.legend.display=false;
  o.plugins.tooltip.callbacks={label:function(x){return ' '+S.g.toUpperCase()+': '+x.parsed.x.toFixed(1)+'%';}};
  o.scales.x={grid:{color:'#f1f5f9'}, border:{display:false},
    ticks:{font:{size:10,family:'IBM Plex Mono'}, color:'#64748b', callback:function(v){return v+'%';}}};
  o.scales.y={grid:{display:false}, border:{display:false},
    ticks:{font:{size:10,family:'Pretendard'}, color:'#334155'}};
  var k = S.g==='qoq'?'qoq':'yoy';
  mk(id,{type:'bar', data:{labels:top.map(function(p){return (p.san?'★ ':'')+p.name.slice(0,16);}),
    datasets:[{data:top.map(function(p){return p[k]==null?0:p[k];}),
      backgroundColor:top.map(function(p){return p.san? c : hexA(CO.mkt,0.55);}),
      borderRadius:3, barThickness:12}]}, options:o});
}
/* ATC 수평바 */
function aC(id,atc){
  var o=chartOpts();
  o.indexAxis='y';
  o.plugins.tooltip.callbacks={label:function(x){return ' '+x.dataset.label+': '+x.parsed.x.toLocaleString(undefined,{maximumFractionDigits:0})+' '+uL();}};
  o.scales.x={stacked:false, grid:{color:'#f1f5f9'}, border:{display:false},
    ticks:{font:{size:10,family:'IBM Plex Mono'}, color:'#64748b',
      callback:function(v){return v>=1000?(v/1000).toFixed(0)+'k':v;}}};
  o.scales.y={grid:{display:false}, border:{display:false}, ticks:{font:{size:11,family:'Pretendard'}, color:'#334155'}};
  mk(id,{type:'bar', data:{labels:atc.map(function(a){return a.name;}), datasets:[
    {label:'Market', data:atc.map(function(a){return sc(a.mkt.matc);}), backgroundColor:hexA(CO.mkt,0.35), borderRadius:3},
    {label:'Santen', data:atc.map(function(a){return sc(a.san.matc);}), backgroundColor:CO.alltc, borderRadius:3}
  ]}, options:o});
}

/* ── components ── */
function kpis(p,c){
  var gr=GR(p);
  var g2 = S.g==='ei'? '<div class="d '+gr.cl+'">EI '+gr.txt+'</div>'
                     : '<div class="d '+gr.cl+'">'+gr.lab+' '+gr.txt+'</div>';
  var mg = S.g==='ei'? '' : '<div class="d '+gr.mcl+'">'+gr.lab+' '+gr.mtxt+'</div>';
  var s1=shr(p), s2=shr(p,'cq'), s1p=p.mkt.matp? p.san.matp/p.mkt.matp*100:0;
  var ds=s1-s1p, dq=s2-s1;
  return '<div class="kpis">'
   +'<div class="kpi"><div class="k">MARKET MAT</div><div class="v mono">'+fmt(p.mkt.matc)+'<small>'+uL()+'</small></div>'+mg+'</div>'
   +'<div class="kpi"><div class="k">SANTEN MAT</div><div class="v mono" style="color:'+c+'">'+fmt(p.san.matc)+'<small>'+uL()+'</small></div>'+g2+'</div>'
   +'<div class="kpi"><div class="k">SHARE (MAT)</div><div class="v mono">'+s1.toFixed(2)+'<small>%</small></div>'
     +'<div class="d '+cls(ds)+'">vs LY '+(ds>=0?'+':'')+ds.toFixed(2)+'pp</div></div>'
   +'<div class="kpi"><div class="k">SHARE (CQ)</div><div class="v mono">'+s2.toFixed(2)+'<small>%</small></div>'
     +'<div class="d '+cls(dq)+'">vs MAT '+(dq>=0?'+':'')+dq.toFixed(2)+'pp</div></div>'
   +'</div>';
}
function segCard(t,st,p,c,base){
  var gr=GR(p), s=shr(p), w=base? Math.min(100, p.mkt.matc/base*100) : 100;
  var line = S.g==='ei'? '<div class="row"><span class="l">EI</span><span class="r '+gr.cl+'">'+gr.txt+'</span></div>'
    : '<div class="row"><span class="l">Santen '+gr.lab+'</span><span class="r '+gr.cl+'">'+gr.txt+'</span></div>'
     +'<div class="row"><span class="l">Market '+gr.lab+'</span><span class="r '+gr.mcl+'">'+gr.mtxt+'</span></div>';
  return '<div class="seg" style="--acc:'+c+'"><div class="t">'+t+'</div><div class="st">'+st+'</div>'
   +'<div class="row"><span class="l">Market MAT</span><span class="r mono">'+fmt(p.mkt.matc)+'</span></div>'
   +'<div class="row"><span class="l">Santen MAT</span><span class="r mono" style="color:'+c+'">'+fmt(p.san.matc)+'</span></div>'
   +'<div class="row"><span class="l">Share</span><span class="r mono">'+s.toFixed(2)+'%</span></div>'
   + line
   +'<div class="bar"><i style="width:'+w+'%"></i></div></div>';
}
function ptable(prods,title){
  var k=S.g==='qoq'?'qoq':'yoy', lab=S.g==='qoq'?'QoQ':'YoY';
  var h='<div class="tw"><table><thead><tr><th>제품</th><th>제조사</th><th>MAT ('+uL()+')</th><th>점유율</th><th>'+lab+'</th><th>CQ</th></tr></thead><tbody>';
  prods.forEach(function(p){
    h+='<tr class="'+(p.san?'s':'')+'"><td>'+(p.san?'<span class="star">★</span>':'')+p.name+'</td>'
     +'<td class="mf">'+p.mfr+'</td>'
     +'<td class="mono">'+fmt(p.matc)+'</td>'
     +'<td class="mono">'+p.share.toFixed(1)+'%</td>'
     +'<td class="mono '+cls(p[k])+'">'+pct(p[k])+'</td>'
     +'<td class="mono">'+fmt(p.cq)+'</td></tr>';
  });
  return '<h2 class="sh">'+title+'</h2>'+h+'</tbody></table></div>';
}
function charts2(p,c,t1,t2){
  return '<div class="grid2">'
   +'<div class="card"><h3>Market vs Santen 분기 추이</h3><div class="cs">'+t1+' · 좌축 Market / 우축 Santen ('+uL()+')</div><div class="chart"><canvas id="c1"></canvas></div></div>'
   +'<div class="card"><h3>Santen Share 분기 추이</h3><div class="cs">'+t2+' · 8개 롤링 분기</div><div class="chart"><canvas id="c2"></canvas></div></div>'
   +'</div>';
}

var R={all:rAll, gl:rGl, de:rDe, al:rAl};

/* ── nav ── */
function navMain(){
  var h='';
  TABS.forEach(function(t){h+='<button data-t="'+t.k+'" class="'+(S.tab===t.k?'on':'')+'">'+t.n+'</button>';});
  document.getElementById('main').innerHTML=h;
}
function navSub(){
  var h='<button data-s="korea" class="'+(S.scope==='korea'?'on':'')+'">전국</button>'
       +'<button data-s="team1" class="'+(S.scope==='team1'?'on':'')+'">'+D.meta.team+'</button><span class="sep"></span>';
  D.meta.mrs.forEach(function(m){
    var k='mr_'+m;
    h+='<button data-s="'+k+'" class="'+(S.scope===k?'on':'')+'">'+m+'</button>';
  });
  document.getElementById('sub').innerHTML=h;
}
function render(){
  document.documentElement.style.setProperty('--ac', acc());
  navMain(); navSub(); R[S.tab]();
}
document.getElementById('main').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return; S.tab=b.dataset.t; render();});
document.getElementById('sub').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return; S.scope=b.dataset.s; render();});
document.getElementById('gM').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return; S.m=b.dataset.v;
  this.querySelectorAll('button').forEach(function(x){x.classList.toggle('on', x===b);}); render();});
document.getElementById('gG').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return; S.g=b.dataset.g;
  this.querySelectorAll('button').forEach(function(x){x.classList.toggle('on', x===b);}); render();});

document.getElementById('per').textContent = 'MAT '+D.meta.matp+' → '+D.meta.matc+'  |  CQ '+D.meta.qlab[7];
document.getElementById('src').textContent = D.meta.src;
render();
</script>
