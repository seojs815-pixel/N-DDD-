    <tr><th class="tn">브릭</th><th class="tn">팀 / MR</th><th>금액(백만)</th><th>수량(box)</th></tr>`;
  lst.forEach(e=>{h+=`<tr class="${e.t==='서울수도권1팀'?'me':''}"><td class="tn">${e.n}</td>
    <td class="tn" style="font-weight:500;color:var(--muted);font-size:11.5px">${e.t} / ${e.mr}</td>
    <td class="up">${(e.v[i1]/1e6).toFixed(2)}</td><td class="up">${e.u[i1].toLocaleString('ko-KR')}</td></tr>`;});
  h+=`</table></div>`;
  document.getElementById('app').innerHTML=h;
}
function render(){
  if(st.mk==='ELAFREE'){renderELA();return;}
  const M=D[st.mk],R=rows(),[i0,i1]=PI[st.p];
  const src=(st.lv==='mr'&&M.mr)?M.mr:M.team;
  let ks2=Object.keys(src);
  if(st.lv==='mr'&&st.sc==='me') ks2=ks2.filter(k=>k.startsWith(M.me+'|'));
  let tsp=0,tsc=0,tcp=0,tcc=0;
  ks2.forEach(n=>{const s=src[n].S[st.m],c=src[n].C[st.m];tsp+=s[i0];tsc+=s[i1];tcp+=c[i0];tcc+=c[i1];});
  const sy=g(tsp,tsc),cy=g(tcp,tcc),gap=(sy||0)-(cy||0);
  const unit=(st.lv==='mr'&&M.mr)?'MR':'팀';
  let h='';
  const me=R.find(r=>r.n===M.me||r.n.startsWith(M.me+'|'));
  const mine=R.filter(r=>r.n===M.me||r.n.startsWith(M.me+'|'));
  if(unit==='팀'&&me){const rk=R.indexOf(me)+1;
    h+=`<div class="alert"><b>서울수도권1팀: 전국 ${R.length}팀 중 ${rk}위</b>
      <p>${PL[st.p]} 기준 산텐 ${pc(me.sy)} vs 경쟁 ${pc(me.cy)} · 격차 ${(me.gap>=0?'+':'')+me.gap.toFixed(1)}p —
      ${me.gap>=0?'경쟁을 앞섭니다':'<b>경쟁에 뒤집니다</b>'}. 전국 평균 산텐 ${pc(sy)} / 경쟁 ${pc(cy)}.</p></div>`;
  }else if(st.sc==='me'){
    const lose=R.filter(r=>r.gap<0);
    h+=`<div class="alert"><b>서울수도권1팀 MR ${R.length}명 · ${PL[st.p]}</b>
      <p>${lose.length}명이 경쟁에 열세입니다${lose.length?' — '+lose.map(r=>r.n.split('|')[1]).join(', '):''}.
      팀 합계는 산텐 ${pc(sy)} vs 경쟁 ${pc(cy)} (격차 ${(gap>=0?'+':'')+gap.toFixed(1)}p).</p></div>`;
  }else if(mine.length){
    const rks=mine.map(r=>R.indexOf(r)+1);
    h+=`<div class="alert"><b>서울수도권1팀 MR 전국 순위 (${R.length}명 중)</b>
      <p>${mine.map((r,i)=>`${r.n.split('|')[1]} ${rks[i]}위`).join(' · ')}</p></div>`;}
  const k=(l,v,s,c)=>`<div class="k"><div class="l">${l}</div><div class="v ${c||''}">${v}</div><div class="s">${s}</div></div>`;
  h+=`<div class="kpi">
    ${k('산텐 당기',f(tsc)+` <span style="font-size:11px;color:var(--faint)">${ul()}</span>`,`${tsc-tsp>=0?'+':''}${f(tsc-tsp)} vs 전기간`,tsc-tsp>=0?'up':'down')}
    ${k('산텐 성장률',pc(sy),'전국 합계',sy>=0?'up':'down')}
    ${k('경쟁 성장률',pc(cy),'동일 기간',cy>=0?'up':'down')}
    ${k('성장률 격차',(gap>=0?'+':'')+gap.toFixed(1)+'p',gap>=0?'산텐 우세':'경쟁 우세',gap>=0?'up':'down')}</div>`;
  h+=`<div class="card"><div class="ct"><h3>${unit}별 산텐 vs 경쟁</h3>
    <div style="display:flex;gap:10px;align-items:center"><div class="sub">${M.scope} · ${PL[st.p]} · ${ul()}</div>
    ${M.mr?`<div class="mini" id="lv"><button data-l="team" class="${st.lv==='team'?'on':''}">팀</button><button data-l="mr" class="${st.lv==='mr'?'on':''}">MR</button></div>`:''}
    ${(M.mr&&st.lv==='mr')?`<div class="mini" id="sc"><button data-s="all" class="${st.sc==='all'?'on':''}">전국</button><button data-s="me" class="${st.sc==='me'?'on':''}">서울수도권1팀</button></div>`:''}</div></div><table>
    <tr><th class="tn">${unit}</th><th>산텐 당기</th><th>점유율</th><th>산텐 성장</th><th>경쟁 성장</th><th>격차(p)</th><th>판정</th></tr>`;
  const show=(unit==='MR'&&st.sc==='all')?R.filter(r=>r.sc>1e8):R;
  show.forEach((r,i)=>{const isMe=(r.n===M.me||r.n.startsWith(M.me+'|'));
    const nm=unit==='MR'?(st.sc==='me'?r.n.split('|')[1]:`${r.n.split('|')[1]} <span class="rk">${r.n.split('|')[0]}</span>`):r.n;
    h+=`<tr class="${isMe?'me':''}"><td class="tn">${nm}</td><td>${f(r.sc)}</td><td>${r.sh.toFixed(1)}%</td>
      <td class="${(r.sy||0)>=0?'up':'down'}">${pc(r.sy)}</td><td class="${(r.cy||0)>=0?'up':'down'}">${pc(r.cy)}</td>
      <td class="${r.gap>=0?'up':'down'}">${(r.gap>=0?'+':'')+r.gap.toFixed(1)}</td>
      <td><span class="vs ${r.gap>=0?'o':'x'}">${r.gap>=0?'우세':'열세'}</span></td></tr>`;});
  h+=`</table></div>`;
  if(unit==='팀'){
    h+=`<div class="card"><div class="ct"><h3>성장률 격차 순위 (산텐 − 경쟁, %p)</h3>
      <div class="sub">${R.filter(r=>r.gap<0).length}/${R.length}팀 열세</div></div><div class="chartbox"><canvas id="cv"></canvas></div></div>`;}
  const cp=M.comp,names=Object.keys(cp).sort((a,b)=>cp[b][1]-cp[a][1]).slice(0,10);
  h+=`<div class="card"><div class="ct"><h3>주요 경쟁 제품 동향 (전국)</h3><div class="sub">VALUE 고정 · ${PL[st.p]}</div></div><table>
    <tr><th class="tn">제품</th><th>당기(백만)</th><th>전기간(백만)</th><th>증감</th><th>성장률</th></tr>`;
  names.forEach(p=>{const v=cp[p],d=(v[i1]-v[i0])/1e6,y=g(v[i0],v[i1]);
    h+=`<tr><td class="tn">${p}</td><td>${(v[i1]/1e6).toFixed(0)}</td><td>${(v[i0]/1e6).toFixed(0)}</td>
      <td class="${d>=0?'up':'down'}">${d>=0?'+':''}${d.toFixed(0)}</td><td class="${(y||0)>=0?'up':'down'}">${pc(y)}</td></tr>`;});
  h+=`</table></div>`;
  document.getElementById('app').innerHTML=h;
  const lv=document.getElementById('lv');
  if(lv)lv.querySelectorAll('button').forEach(b=>b.onclick=()=>{st.lv=b.dataset.l;render();});
  const scv=document.getElementById('sc');
  if(scv)scv.querySelectorAll('button').forEach(b=>b.onclick=()=>{st.sc=b.dataset.s;render();});
  if(unit==='팀'){if(ch)ch.destroy();
    ch=new Chart(document.getElementById('cv'),{type:'bar',data:{labels:R.map(r=>r.n),
      datasets:[{label:'격차',data:R.map(r=>+r.gap.toFixed(1)),
        backgroundColor:R.map(r=>r.n===M.me?'#dc2626':(r.gap>=0?'#0284c7':'#f59e0b')),borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>(c.raw>=0?'+':'')+c.raw+'%p'}}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10.5}}},y:{grid:{color:'#eef2f7'},ticks:{font:{size:10}}}}}});}
}
document.querySelectorAll('#nv button').forEach(b=>b.onclick=()=>{st.mk=b.dataset.k;st.lv='team';st.sc='all';
  document.querySelectorAll('#nv button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.querySelectorAll('#pt button').forEach(b=>b.onclick=()=>{st.p=b.dataset.p;
  document.querySelectorAll('#pt button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.querySelectorAll('#mt button').forEach(b=>b.onclick=()=>{st.m=+b.dataset.m;
  document.querySelectorAll('#mt button').forEach(x=>x.classList.toggle('on',x===b));render();});
render();
</script></body></html>
