<title>서울수도권1팀 · 브릭 성장 드릴다운 (May 2026)</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#eef1f5;--card:#fff;--line:#e2e8f0;--line2:#eef2f7;
  --ink:#0f172a;--muted:#64748b;--faint:#94a3b8;
  --santen:#0284c7;--santen-bg:#e0f2fe;--comp:#db2777;--comp-bg:#fce7f3;
  --up:#059669;--up-bg:#d1fae5;--down:#dc2626;--down-bg:#fee2e2;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:60px}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px}
header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40}
.hd{display:flex;align-items:center;justify-content:space-between;gap:12px;height:52px}
.hd h1{font-size:16px;font-weight:700;letter-spacing:-.01em}
.hd h1 .tabmark{font-size:10px;font-weight:700;background:var(--santen-bg);color:var(--santen);padding:2px 7px;border-radius:5px;margin-left:4px}
.hd h1 span{color:var(--muted);font-weight:500;font-size:13px;margin-left:6px}
.metric-toggle{display:flex;background:var(--bg);border-radius:8px;padding:3px;border:1px solid var(--line)}
.metric-toggle button{border:0;background:transparent;font-family:var(--mono);font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;color:var(--muted);transition:.12s}
.metric-toggle button.on{background:var(--ink);color:#fff}
.navrow{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:52px;z-index:39}
.navflex{display:flex;align-items:center;gap:18px;height:44px;flex-wrap:wrap}
.seg{display:flex;gap:2px}
.seg button{border:0;background:transparent;font-size:13px;font-weight:600;color:var(--muted);padding:8px 4px;margin-right:14px;cursor:pointer;border-bottom:2px solid transparent;transition:.12s}
.seg button.on{color:var(--ink);border-bottom-color:var(--ink)}
.ta-seg button.on{border-bottom-color:var(--santen)}
.spacer{flex:1}
.legend{display:flex;gap:14px;align-items:center;font-size:11px;color:var(--muted);font-family:var(--mono);margin-left:auto}
.legend i{width:20px;height:8px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:4px}
.mrchips{display:flex;gap:6px;flex-wrap:wrap;padding:14px 0 2px}
.mrchips button{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.12s}
.mrchips button:hover{border-color:var(--faint)}
.mrchips button.on{background:var(--santen);border-color:var(--santen);color:#fff}
main{padding-top:14px}
.mrsum{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 16px}
.mrsum .kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;flex:1;min-width:160px}
.mrsum .kpi .lab{font-size:11px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}
.mrsum .kpi .dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.mrsum .kpi .val{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:3px}
.mrsum .kpi .sub{font-family:var(--mono);font-size:11px;margin-top:1px}
.up{color:var(--up)}.down{color:var(--down)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.ctitle{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line2)}
.ctitle .nm{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.02em}
.pill.s{background:var(--santen-bg);color:var(--santen)}
.pill.c{background:var(--comp-bg);color:var(--comp)}
.ctitle .agg{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right}
.rows{padding:8px 6px 12px}
.brow{display:grid;grid-template-columns:200px 1fr 166px;align-items:center;gap:10px;padding:5px 12px;border-bottom:1px solid var(--line2)}
.brow:last-child{border-bottom:0}
@media(max-width:820px){.brow{grid-template-columns:140px 1fr 120px}}
.bname{font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bname .mr{color:var(--faint);font-weight:500}
.bqty{font-family:var(--mono);font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bqty b{color:var(--ink);font-weight:600}
.cprod{font-size:10.5px;color:var(--comp);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cprod .nw{color:var(--up)}
.barbox{position:relative;height:22px;display:flex;align-items:center}
.axis{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
.bar{position:absolute;height:14px;border-radius:3px;opacity:.9}
.bfig{font-family:var(--mono);font-size:11.5px;text-align:right;white-space:nowrap}
.bfig .d{font-weight:600}.bfig .p{color:var(--faint);font-size:10px}
.badge{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:4px}
.badge.new{background:var(--up-bg);color:var(--up)}
.empty{padding:22px 16px;color:var(--faint);font-size:12px;text-align:center}
.hint{color:var(--muted);font-size:12px;margin:2px 0 12px;font-family:var(--mono)}
.kpi4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0 6px}
@media(max-width:820px){.kpi4{grid-template-columns:repeat(2,1fr)}}
.kpi4 .k{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.kpi4 .k .l{font-size:11px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}
.kpi4 .k .l i{width:8px;height:8px;border-radius:2px;display:inline-block}
.kpi4 .k .v{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:4px;letter-spacing:-.02em}
.kpi4 .k .s{font-family:var(--mono);font-size:11px;margin-top:2px}
.chartcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:14px 0 4px}
.chartcard h3{font-size:13px;font-weight:700;margin-bottom:4px}
.chartcard p{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:10px}
.chartbox{height:230px;position:relative}
.guide{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin:14px 0 0;font-size:11.5px;color:var(--muted);line-height:1.7}
.guide b{color:var(--ink)}
h2.sec{font-size:13px;font-weight:700;color:var(--muted);margin:18px 0 10px;letter-spacing:.02em}
</style>

const state={metric:'value',period:'yoy',ta:DATA.tas[0].key,view:'mr',mr:null};
const PIDX={yoy:[0,1],hoh:[2,3],qoq:[4,5]};
const PLAB={yoy:'YoY · MAT.May.2026 vs MAT.May.2025',hoh:'HoH · Dec2025~May2026 vs Jun~Nov2025',qoq:'QoQ · Mar~May2026 vs Dec2025~Feb2026'};

const MR_ORDER=(function(){
  const pref=['강태욱','오민석','류동균','주해린','한정호','한종찬','서준희','배승현','임다빈'];
  const found=new Set();
  DATA.tas.forEach(t=>{(DATA.santen[t.key]||[]).concat(DATA.comp[t.key]||[]).forEach(l=>{
    Object.keys(DATA[t.key][l]||{}).forEach(m=>found.add(m));});});
  const ordered=pref.filter(m=>found.has(m));
  [...found].sort().forEach(m=>{if(!ordered.includes(m))ordered.push(m);});
  return ordered;
})();
const isV=()=>state.metric==='value';
const fmt=v=>isV()?(v/1e6).toLocaleString('ko-KR',{maximumFractionDigits:1}):Math.round(v).toLocaleString('ko-KR');
const fmtQ=v=>Math.round(v).toLocaleString('ko-KR');
const fmtV=v=>(v/1e6).toLocaleString('ko-KR',{maximumFractionDigits:1});
const unitLab=()=>isV()?'백만원':'unit(box)';
const yoy=(p,c)=>p<=0?(c>0?null:0):(c/p-1)*100;

function bricks(ta,label,mrFilter){
  const g=DATA[ta][label]||{};let out=[];
  for(const mr in g){ if(mrFilter&&mr!==mrFilter)continue;
    for(const b of g[mr]){
      const[i0,i1]=PIDX[state.period];
      const arr=isV()?b.v:b.u, alt=isV()?b.u:b.v;
      const prev=arr[i0],cur=arr[i1];
      out.push({mr,name:b.n,prev,cur,d:cur-prev,ap:alt[i0],ac:alt[i1],pr:b.pr});
    }}
  return out;
}
function bar(d,maxAbs){
  const pct=maxAbs?Math.min(50,Math.abs(d)/maxAbs*50):0, pos=d>=0;
  const st=pos?`left:50%;width:${pct}%;background:var(--up)`:`right:50%;width:${pct}%;background:var(--down)`;
  return `<div class="barbox"><div class="axis"></div><div class="bar" style="${st}"></div></div>`;
}
// competitor 주도 제품 라벨
function compLabel(o){
  if(!o.pr) return '';
  const[i0,i1]=PIDX[state.period], k=isV()?1:2;
  let arr=o.pr.map(p=>({n:p[0],prev:p[k][i0],cur:p[k][i1],d:p[k][i1]-p[k][i0]})).filter(x=>x.cur>0||x.prev>0);
  arr.sort((a,b)=>b.cur-a.cur);
  if(!arr.length) return '';
  const parts=arr.slice(0,2).map(x=>{
    const nw=(x.prev<=0&&x.cur>0)?'<span class="nw">NEW</span>':'';
    const dd=x.d>=0?`+${fmt(x.d)}`:`${fmt(x.d)}`;
    return `${x.n} ${dd}${nw}`;
  });
  return `<div class="cprod" title="주도 경쟁제품">↳ ${parts.join(' · ')}</div>`;
}
function qtyLine(o){
  // 금액·수량을 항상 함께 표기 (현재 선택된 지표를 굵게)
  const V=isV()?[o.prev,o.cur]:[o.ap,o.ac];
  const U=isV()?[o.ap,o.ac]:[o.prev,o.cur];
  const vs=`금액 ${fmtV(V[0])}→${fmtV(V[1])}백만`;
  const us=`수량 ${fmtQ(U[0])}→${fmtQ(U[1])} box`;
  return isV()?`<b>${vs}</b> · ${us}`:`${vs} · <b>${us}</b>`;
}
function figCell(o){
  const y=yoy(o.prev,o.cur);
  const cls=o.d>=0?'up':'down';
  const sub = (o.prev<=0&&o.cur>0)
      ? `<span class="badge new">신규 진입</span>`
      : `<span class="p">${PVS[state.period]} <b class="${(y||0)>=0?'up':'down'}">${y>=0?'+':''}${y.toFixed(1)}%</b></span>`;
  return `<div class="bfig"><span class="d ${cls}">${o.d>=0?'+':''}${fmt(o.d)}</span>
    <span class="p" style="font-size:9.5px"> ${unitLab()}</span><br>${sub}</div>`;
}
function rowHTML(o,maxAbs,showMR){
  const nm=showMR?`<span class="mr">[${o.mr}] </span>${o.name}`:o.name;
  return `<div class="brow"><div><div class="bname" title="${o.name}">${nm}</div>
    <div class="bqty">${qtyLine(o)}</div>${compLabel(o)}</div>${bar(o.d,maxAbs)}${figCell(o)}</div>`;
}
function productCard(ta,label,isSanten,mrFilter,mode){
  let bs=bricks(ta,label,mrFilter);
  const tp=bs.reduce((s,b)=>s+b.prev,0),tc=bs.reduce((s,b)=>s+b.cur,0),y=yoy(tp,tc);
  const maxAbs=Math.max(1,...bs.map(b=>Math.abs(b.d)));
  let shown;
  if(mode==='up') shown=bs.filter(b=>b.d>0).sort((a,b)=>b.d-a.d).slice(0,10);
  else if(mode==='down') shown=bs.filter(b=>b.d<0).sort((a,b)=>a.d-b.d).slice(0,10);
  else shown=bs.sort((a,b)=>b.d-a.d);
  const cls=isSanten?'s':'c';
  const rowsH=shown.length?shown.map(o=>rowHTML(o,maxAbs,!mrFilter)).join(''):'<div class="empty">해당 브릭 없음</div>';
  const ys=y===null?'NEW':`${y>=0?'+':''}${y.toFixed(1)}%`;
  const modeLab=mode==='up'?'<span class="up">급성장 TOP10</span>':mode==='down'?'<span class="down">급락 TOP10</span>':`${fmt(tc)} <span style="color:var(--faint)">/</span> <span class="${(tc-tp)>=0?'up':'down'}">${ys}</span>`;
  return `<div class="card"><div class="ctitle"><div class="nm"><span class="pill ${cls}">${isSanten?'SANTEN':'경쟁'}</span>${label}</div>
    <div class="agg">${modeLab}</div></div><div class="rows">${rowsH}</div></div>`;
}

  const[sp,sc]=sumOf(santen),[cp,cc]=sumOf(comp);

  const labels=[...DATA.santen[ta].map(l=>[l,true]),...DATA.comp[ta].map(l=>[l,false])];
  let h=`<div class="hint">팀 전체 · 제품별 급성장/급락 브릭 · ${PLAB[state.period]} (${unitLab()} 기준)</div>`;
  labels.forEach(([l,s])=>{h+=`<h2 class="sec">${s?'🔵 ':'🔴 '}${l}</h2><div class="grid">${productCard(ta,l,s,null,'up')}${productCard(ta,l,s,null,'down')}</div>`;});
  document.getElementById('content').innerHTML=h;
}
function taTotals(mr){
  const ta=state.ta;
  const sum=labels=>{let p=0,c=0;(labels||[]).forEach(l=>bricks(ta,l,mr).forEach(b=>{p+=b.prev;c+=b.cur}));return[p,c]};
  return {s:sum(DATA.santen[ta]), c:sum(DATA.comp[ta])};
}
function kpiBar(){
  const t=taTotals(null);
  const[sp,sc]=t.s,[cp,cc]=t.c;
  const sy=yoy(sp,sc),cy=yoy(cp,cc);
  const gap=(sy===null?0:sy)-(cy===null?0:cy);
  const k=(l,col,v,sub,cls)=>`<div class="k"><div class="l">${col?`<i style="background:${col}"></i>`:''}${l}</div>
    <div class="v">${v}</div><div class="s ${cls||''}">${sub}</div></div>`;
  return `<div class="kpi4">
    ${k('산텐 합계','var(--santen)',fmt(sc)+`<span style="font-size:11px;color:var(--faint)"> ${unitLab()}</span>`,
        `${sc-sp>=0?'+':''}${fmt(sc-sp)} vs 전기간`, sc-sp>=0?'up':'down')}
    ${k('경쟁 합계','var(--comp)',fmt(cc)+`<span style="font-size:11px;color:var(--faint)"> ${unitLab()}</span>`,
        `${cc-cp>=0?'+':''}${fmt(cc-cp)} vs 전기간`, cc-cp>=0?'up':'down')}
    ${k('산텐 '+PSHORT[state.period],'',(sy===null?'NEW':(sy>=0?'+':'')+sy.toFixed(1)+'%'),PLAB[state.period].split(' · ')[1], sy>=0?'up':'down')}
    ${k('성장률 격차','',(gap>=0?'+':'')+gap.toFixed(1)+'p',
        gap>=0?'산텐이 경쟁보다 빠름':'경쟁이 산텐보다 빠름', gap>=0?'up':'down')}
  </div>`;
}
let mrChart=null;
function drawMRChart(){
  const ctx=document.getElementById('mrCanvas'); if(!ctx) return;
  const ta=state.ta;
  const sd=[],cd=[];
  MR_ORDER.forEach(m=>{
    const t=taTotals(m);
    sd.push((t.s[1]-t.s[0])/(isV()?1e6:1));
    cd.push((t.c[1]-t.c[0])/(isV()?1e6:1));
  });
  if(mrChart) mrChart.destroy();
  mrChart=new Chart(ctx,{type:'bar',data:{labels:MR_ORDER,datasets:[
      {label:'산텐 Δ',data:sd,backgroundColor:'#0284c7',borderRadius:3},
      {label:'경쟁 Δ',data:cd,backgroundColor:'#db2777',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.raw>=0?'+':'')+c.raw.toLocaleString('ko-KR',{maximumFractionDigits:1})}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11}}},
              y:{grid:{color:'#eef2f7'},ticks:{font:{size:10},callback:v=>v.toLocaleString('ko-KR')}}}}});
}
function guideHTML(){
  return `<b>표 보는 법</b> · 브릭명 아래 <b>금액 A→B백만 · 수량 A→B box</b> = 전기간→당기간 실적(현재 선택 지표를 굵게 표시).
   오른쪽 큰 숫자 = <b>증감액(${unitLab()})</b>, 그 아래 = <b>${PVS[state.period]} 증감률</b>.
   현재 기준: ${PLAB[state.period]}`;
}
function render(){
  document.getElementById('mrChips').style.display=state.view==='mr'?'flex':'none';
  const kpiH=kpiBar()+`<div class="chartcard"><h3>MR별 산텐 vs 경쟁 증감 (Δ)</h3>
    <p>${unitLab()} 기준 · ${PLAB[state.period]}</p><div class="chartbox"><canvas id="mrCanvas"></canvas></div></div>`;
  document.getElementById('guide').innerHTML=guideHTML();
  if(state.view==='mr'){if(!state.mr)state.mr=MR_ORDER[0];renderMR();}else renderTeam();
  const c=document.getElementById('content'); c.innerHTML=kpiH+c.innerHTML;
  drawMRChart();
}
(function(){const el=document.getElementById('taSeg');
  el.innerHTML=DATA.tas.map((t,i)=>`<button data-ta="${t.key}" class="${i===0?'on':''}">${t.label}</button>`).join('');
})();
(function(){const el=document.getElementById('mrChips');
  el.innerHTML=MR_ORDER.map(m=>`<button data-mr="${m}">${m}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.mr=b.dataset.mr;
    el.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));render();});})();
document.getElementById('periodToggle').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.period=b.dataset.p;
  document.getElementById('periodToggle').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('metricToggle').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.metric=b.dataset.m;
  document.getElementById('metricToggle').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('taSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.ta=b.dataset.ta;
  document.getElementById('taSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('viewSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.view=b.dataset.v;
  document.getElementById('viewSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('ttl').firstChild.textContent=DATA.team+' · 브릭 성장 드릴다운';
document.querySelector('#mrChips button').classList.add('on');
render();
</script>
</body>
